# Biobase: scrape cAdvisor for per-container time series (bb_* in Grafana).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: biobase_cadvisor
    static_configs:
      - targets: ["bb_monitor_cadvisor:8080"]
        labels:
          project: biobase

  - job_name: biobase_rcon
    scrape_interval: 10s
    static_configs:
      - targets: ["bb_monitor_rcon:9105"]
        labels:
          project: biobase
          target: cs2
