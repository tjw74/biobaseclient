name: Windows Installer Build

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint:config
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:win:installer:unsigned
      - name: Keep only the user installer executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer | Out-Null
          $installer = Get-ChildItem release -Filter "Biobase-Client-Setup-*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer executable not found" }
          Copy-Item $installer.FullName installer/Biobase-Client-Setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: Biobase-Client-Setup
          path: installer/Biobase-Client-Setup.exe
      - name: Publish latest release asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = "installer/Biobase-Client-Setup.exe"
          if (-not (Test-Path $asset)) { throw "Installer asset missing: $asset" }
          gh release view latest *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create latest $asset --title "Latest Biobase Client" --notes "Unsigned latest Windows test build. Download and run Biobase-Client-Setup.exe." --latest
          } else {
            gh release upload latest $asset --clobber
            gh release edit latest --title "Latest Biobase Client" --notes "Unsigned latest Windows test build. Download and run Biobase-Client-Setup.exe." --latest
          }
