# Unified admin entry: Grafana (/bb), Loki (/loki), CS2 control (/cs2). Prometheus: host port 19090.
# 127.0.0.11 is Docker’s DNS — delays upstream resolution so nginx can start before other containers.
map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  client_max_body_size 16M;

  location = /favicon.ico {
    return 204;
    access_log off;
  }

  # Grafana (subpath /bb/ — set GF_SERVER_ROOT_URL=http://biobase.local/bb/ when using this host)
  location /bb/ {
    set $grafana "bb_monitor_grafana:3000";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_pass http://$grafana$request_uri;
  }

  # Loki (path prefix /loki in loki-config.yaml)
  location /loki/ {
    set $loki "bb_monitor_loki:3100";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_pass http://$loki$request_uri;
  }

  # CS2: strip /cs2/ → FastAPI at /
  location = /cs2 {
    return 301 $scheme://$http_host/cs2/;
  }

  location /cs2/ {
    rewrite ^/cs2/?(.*)$ /$1 break;
    set $cs2c "bb_cs2_control:8765";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_pass http://$cs2c;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
  }
}
