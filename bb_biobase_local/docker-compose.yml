# Biobase LAN admin hub: http://biobase.local/ (mDNS on host) → nginx → Grafana, Loki, CS2 control; Prometheus on :19090.
# Requires: biobase_internal network (from bb_monitor_loki), stacks that publish those services, and mDNS (see ./mdns/).
services:
  bb_biobase_local:
    image: nginx:1.27-alpine
    container_name: bb_biobase_local
    # Default 8880: port 80 is often already taken (e.g. another reverse proxy). Override: BIOBASE_LOCAL_PORT=80
    ports:
      - "${BIOBASE_LOCAL_PORT:-8880}:80"
    volumes:
      - ./nginx/biobase.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - biobase_internal
    restart: unless-stopped

networks:
  biobase_internal:
    external: true
    name: biobase_internal
