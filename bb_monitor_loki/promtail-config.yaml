# Biobase: ship Docker logs for game server and RCON collector to bb_monitor_loki.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://bb_monitor_loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: biobase_bb_cs2
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /(bb_cs2_server|bb_monitor_rcon)
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
        replacement: $1
      - target_label: project
        replacement: biobase
