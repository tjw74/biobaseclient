name: biobase_client
description: "Biobase Performance Lab — CS2 movement analytics desktop client."
publish_to: 'none'
version: 0.11.33+17

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.4.0
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0
  shared_preferences: ^2.5.0
  window_manager: ^0.4.0
  path: ^1.9.0
  file_picker: ^8.0.0
  archive: ^4.0.2
  cs2_capture:
    path: packages/cs2_capture
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/cs2_plugin/server.dll
    - assets/cs2_plugin/LICENSE-cs-demo-manager
    - assets/boiler/boiler-writter.exe
    - assets/boiler/steam_api64.dll
    - assets/boiler/steam_appid.txt
    - assets/boiler/LICENSE-boiler-writter
