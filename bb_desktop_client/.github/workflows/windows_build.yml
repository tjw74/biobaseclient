name: Windows Client Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint:config
      - run: npm run typecheck
      - run: npm test
      - run: npm run dist:win:unsigned
      - uses: actions/upload-artifact@v4
        with:
          name: biobase-windows-client
          path: release/*
