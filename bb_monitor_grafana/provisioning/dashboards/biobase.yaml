apiVersion: 1
providers:
  - name: biobase
    orgId: 1
    folder: Biobase
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    # Keep repo JSON as source of truth so panels stay in sync (wrong table names → SQL errors / "No data").
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/biobase-dashboards
