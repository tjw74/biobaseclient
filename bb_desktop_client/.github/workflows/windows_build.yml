name: Windows Client Build

on:
  push:
    paths:
      - 'bb_desktop_client/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: bb_desktop_client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bb_desktop_client/package-lock.json
      - run: npm install
      - run: npm run lint:config
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: biobase-windows-client
          path: bb_desktop_client/release/*
