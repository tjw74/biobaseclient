apiVersion: 1
deleteDatasources: []
datasources:
  - name: Biobase Loki
    type: loki
    access: proxy
    url: http://bb_monitor_loki:3100
    uid: bb-loki
    isDefault: true
    jsonData:
      maxLines: 2000
  - name: Biobase Prometheus
    type: prometheus
    access: proxy
    url: http://bb_monitor_prometheus:19090
    uid: bb-prometheus
    isDefault: false
    jsonData:
      timeInterval: 10s
  - name: Biobase Postgres
    type: postgres
    access: proxy
    url: ${POSTGRES_ADDR}
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    uid: bb-postgres
    isDefault: false
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
